```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Extractor pCloud PRO</title>

<style>
body {
  background:#0d0d0d;
  color:#fff;
  font-family:Arial;
  text-align:center;
}

#grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:10px;
  margin-top:20px;
}

.card {
  background:#1a1a1a;
  padding:5px;
  border-radius:10px;
}

.card img {
  width:100%;
  border-radius:8px;
}

textarea {
  width:90%;
  height:150px;
  margin-top:20px;
}

button {
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:8px;
  background:#00ff88;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>🔥 pCloud Image Extractor</h1>

<button onclick="extrair()">Extrair Imagens</button>
<button onclick="copiar()">Copiar Links</button>

<div id="grid"></div>
<textarea id="links"></textarea>

<script>

// COLE AQUI O publinkData
const publinkData = YOUR_DATA_HERE;

function extrair() {
  const files = publinkData.metadata.contents;

  let imagens = files
    .filter(f => f.contenttype.includes("image"))
    .sort((a,b)=> {
      return a.name.localeCompare(b.name, undefined, {numeric:true});
    });

  let links = [];
  const grid = document.getElementById("grid");
  const textarea = document.getElementById("links");

  grid.innerHTML = "";

  imagens.forEach(file => {

    const link = `https://api.pcloud.com/getfilelink?fileid=${file.fileid}&code=${publinkData.code}`;

    links.push(link);

    const div = document.createElement("div");
    div.className = "card";

    const img = document.createElement("img");

    // preview (thumb)
    img.src = `https://api.pcloud.com/getpubthumb?code=${publinkData.code}&fileid=${file.fileid}&size=300x300`;

    div.appendChild(img);
    grid.appendChild(div);
  });

  textarea.value = links.join("\n");
}

function copiar() {
  const textarea = document.getElementById("links");
  textarea.select();
  document.execCommand("copy");
  alert("Copiado!");
}

</script>

</body>
</html>
```
