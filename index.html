<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>PDF para Imagens</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: #fff;
    text-align: center;
}

#preview {
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding: 20px;
}

.page {
    background: #222;
    padding: 10px;
    border-radius: 10px;
    position: relative;
}

.page img {
    width: 100%;
    max-width: 400px;
}

.remove-btn {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: red;
    border: none;
    color: white;
    padding: 5px 10px;
    cursor: pointer;
    border-radius: 5px;
}

.floating {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: green;
    color: white;
    padding: 15px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>📄 PDF → Imagens</h2>

<input type="file" id="upload" accept="application/pdf">

<div id="preview"></div>

<div class="floating" onclick="gerarZip()">ZIP</div>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<!-- JSZip -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
const preview = document.getElementById("preview");
let imagens = [];

document.getElementById("upload").addEventListener("change", async function(e) {
    const file = e.target.files[0];
    if (!file) return;

    preview.innerHTML = "";
    imagens = [];

    const reader = new FileReader();
    reader.onload = async function() {
        const pdf = await pdfjsLib.getDocument({data: reader.result}).promise;

        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);

            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            const viewport = page.getViewport({ scale: 2 });
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            await page.render({ canvasContext: ctx, viewport: viewport }).promise;

            const imgData = canvas.toDataURL("image/png");

            adicionarPagina(imgData, i);
        }
    };
    reader.readAsArrayBuffer(file);
});

function adicionarPagina(src, numero) {
    const div = document.createElement("div");
    div.className = "page";

    const img = document.createElement("img");
    img.src = src;

    const label = document.createElement("p");
    label.innerText = "Página " + numero;

    const btn = document.createElement("button");
    btn.innerText = "Remover";
    btn.className = "remove-btn";

    btn.onclick = () => {
        div.remove();
        imagens = imagens.filter(i => i !== src);
        atualizarNumeros();
    };

    div.appendChild(label);
    div.appendChild(img);
    div.appendChild(btn);

    preview.appendChild(div);
    imagens.push(src);
}

function atualizarNumeros() {
    const pages = document.querySelectorAll(".page");
    pages.forEach((p, i) => {
        p.querySelector("p").innerText = "Página " + (i + 1);
    });
}

async function gerarZip() {
    if (imagens.length === 0) return alert("Nenhuma imagem!");

    const zip = new JSZip();

    imagens.forEach((img, i) => {
        const base64 = img.split(",")[1];
        zip.file(`pagina_${i+1}.png`, base64, {base64: true});
    });

    const content = await zip.generateAsync({type:"blob"});

    const a = document.createElement("a");
    a.href = URL.createObjectURL(content);
    a.download = "imagens.zip";
    a.click();
}
</script>

</body>
</html>
